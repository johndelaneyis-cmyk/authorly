<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#faf6f0"/>

  <!-- top rule with section ornament -->
  <line x1="80" y1="90" x2="540" y2="90" stroke="#e0d5c0" stroke-width="1"/>
  <text x="555" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#a83232" font-style="italic">§</text>
  <line x1="585" y1="90" x2="1120" y2="90" stroke="#e0d5c0" stroke-width="1"/>

  <!-- eyebrow -->
  <text x="80" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="500" letter-spacing="3.6" fill="#a83232">FOR INDIE AUTHORS</text>

  <!-- headline -->
  <text x="80" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="500" fill="#1a1814" letter-spacing="-1.5">Find the right</text>
  <text x="80" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-style="italic" font-weight="500" fill="#a83232" letter-spacing="-1.5">comp titles</text>
  <text x="430" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="500" fill="#1a1814" letter-spacing="-1.5">for your book.</text>

  <!-- subline -->
  <text x="80" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#3a3530">Generated in seconds. Free. No manuscript upload required.</text>

  <!-- bottom rule + brand -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#e0d5c0" stroke-width="1"/>
  <text x="80" y="585" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="600" fill="#1a1814">Author<tspan fill="#a83232" font-style="italic" font-weight="500">ly</tspan></text>
  <text x="1120" y="585" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#6b6760">authorly.tools</text>
</svg>
